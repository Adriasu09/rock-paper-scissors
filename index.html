<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Carnival | Inicio</title>
    <link rel="stylesheet" href="./style/main.css" />
  </head>
  <body>
    <div class="page-wrapper">
      <header class="topbar card">
        <div class="brand">
          <span class="brand-symbol">♀</span>
          <span>FemCoders</span>
        </div>

        <div class="topbar-meta">
          <button
            class="primary-button"
            type="button"
            onclick="window.location.href='./register.html'"
          >
            Inicio de sesión / Registro
          </button>
          <span class="meta-pill">Hola, <strong id="display-name">Invitada</strong></span>
          <span class="meta-pill">País: <span id="display-country">Pendiente</span></span>
          <span class="meta-pill">Día: <span id="display-date">Sin seleccionar</span></span>
          <span class="meta-pill">Hora: <span id="display-time">Sin seleccionar</span></span>
          <span class="meta-pill">Temperatura: 22ºC</span>
        </div>

        <nav class="topnav">
          <button class="nav-tab is-active" type="button" data-target="games-panel">
            Juego
          </button>
          <button class="nav-tab" type="button" data-target="about-panel">
            Sobre nosotras
          </button>
        </nav>
      </header>

      <main class="app-shell app-shell-empty">
        <section id="games-panel" class="content-panel is-active"></section>

        <section id="about-panel" class="content-panel"></section>
      </main>
    </div>

    <script type="module" src="./index.js"></script>
  </body>
</html>
