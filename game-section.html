<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rock-Paper-Scissors</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="./style/main.css" />
    <link rel="stylesheet" href="./style/gameSection.css" />

</head>

<body>

    <div class="layout">

        <div class="sidebar-left"></div>
        <section class="game">

            <div class="score-hdr">

                <div class="score-cpu">
                    <span>CPU</span>
                    <span id="cpu-score">0</span>
                </div>

                <span class="score-hdr-vs" aria-hidden="true">VS</span>

                <div class="score-player">
                    <span>TÚ</span>
                    <span id="player-score">0</span>
                </div>
            </div>

            <div class="arena">
                <img class="arena-hand" id="img-cpu" src="./assets/images/rock-right.png" alt="left hand">
                <div class="arena-center">
                    <div class="arena-circle">
                        <span id="countdown">3</span>
                    </div>
                    <span class="arena-vs" aria-hidden="true">VS</span>
                </div>
                <img class="arena-hand" id="img-player" src="./assets/images/rock-left.png" alt="right hand">
            </div>

            <div class="ctrl-section">
                <p id="message" class="ctrl-section-message">¡Elige tu movimiento!</p>

                <div class="options" role="group" aria-label="Elige tu movimiento">
                    <button type="button" id="btn-rock" class="btn--move btn--move--rock" aria-keyshortcuts="A">
                        <img class="btn--move-icon" src="./assets/icon/rock.svg" alt="Rock" aria-hidden="true">
                        <span class="btn--move-label">Piedra</span>
                        <kbd class="btn--move-key" aria-hidden="true">A</kbd>
                    </button>

                    <button type="button" id="btn-paper" class="btn--move btn--move--paper" aria-keyshortcuts="S">
                        <img class="btn--move-icon" src="./assets/icon/Paper.svg" alt="Paper" aria-hidden="true">
                        <span class="btn--move-label">Papel</span>
                        <kbd class="btn--move-key" aria-hidden="true">S</kbd>
                    </button>

                    <button type="button" id="btn-scissors" class="btn--move btn--move--scissors" aria-keyshortcuts="D">
                        <img class="btn--move-icon" src="./assets/icon/Scissors.svg" alt="Scissor" aria-hidden="true">
                        <span class="btn--move-label">Tijera</span>
                        <kbd class="btn--move-key" aria-hidden="true">D</kbd>
                    </button>
                </div>
            </div>    

                <button type="button" id="btn-sound" class="sound-btn" aria-label="Silenciar sonido"
                    aria-pressed="false">
                    <img class="sound-btn-icon" src="./assets/icon/volume-2.svg" alt="Sound" aria-hidden="true">
                </button>
            


        </section>

        <div class="sidebar-right"></div>
    </div>
</body>

</html>
